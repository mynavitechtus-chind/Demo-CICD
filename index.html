<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo CI/CD - V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            color: #fff;
            overflow: hidden;
        }
        
        .background-blobs {
            position: absolute;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #ff2a5f;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: #00d2ff;
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3rem 4rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-top: 0;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            max-width: 450px;
            margin: 0 auto 1.5rem;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff2a5f, #ff7e67);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(255, 42, 95, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 42, 95, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="container">
        <h1>Hello CI/CD World!</h1>
        <p>This is a simple Node.js application deployed for testing CI/CD pipelines via GitHub Actions, S3, and CloudFront.</p>
        <div class="badge">Version 4</div>
    </div>
</body>
</html>
